{% extends "base.html" %}
{% block title %}Admin — Férias Mil Grau{% endblock %}

{% block extra_css %}
<style>
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:40px 36px;width:100%;max-width:380px}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--light);letter-spacing:2px;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;font-weight:600}
.form-group{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
input{width:100%;background:#060d18;border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;outline:none;transition:border-color .2s}
input:focus{border-color:var(--primary)}
.btn-login{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,102,204,.4)}
.error-box{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.3);border-radius:10px;padding:12px 16px;color:var(--danger);font-size:13px;font-weight:700;margin-bottom:16px}
.back-link{display:block;text-align:center;margin-top:14px;color:var(--muted);font-size:13px;text-decoration:none}
.back-link:hover{color:var(--text)}
</style>
{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-title">⚙️ Área Admin</div>
    <div class="login-sub">Férias Mil Grau — Painel Administrativo</div>
    {% if error %}
    <div class="error-box">❌ {{error}}</div>
    {% endif %}
    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label>Usuário</label>
        <input name="usuario" placeholder="admin" autofocus>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input name="senha" type="password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn-login">Entrar no Painel</button>
    </form>
    <a href="/" class="back-link">← Voltar para inscrições</a>
  </div>
</div>
{% endblock %}
